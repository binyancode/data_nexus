<!-- 算子代数 -->
<text fill="#EAF0F6" font-size="24" font-weight="700" text-anchor="middle" x="800" y="230">SQG 算子代数（正交、极小集合）</text>
<g font-size="20">
<rect fill="#1C2A42" height="90" rx="12" stroke="#2E4060" width="440" x="90" y="270"></rect>
<text fill="#4FACFE" font-weight="700" x="115" y="308">SELECT / PROJECT</text>
<text fill="#B0BEC5" x="115" y="340">取概念的属性</text>
<rect fill="#1C2A42" height="90" rx="12" stroke="#2E4060" width="440" x="580" y="270"></rect>
<text fill="#4FACFE" font-weight="700" x="605" y="308">FILTER</text>
<text fill="#B0BEC5" x="605" y="340">维度约束</text>
<rect fill="#1C2A42" height="90" rx="12" stroke="#2E4060" width="440" x="1070" y="270"></rect>
<text fill="#4FACFE" font-weight="700" x="1095" y="308">AGGREGATE</text>
<text fill="#B0BEC5" x="1095" y="340">指标计算</text>
<rect fill="#1C2A42" height="90" rx="12" stroke="#2E4060" width="440" x="90" y="380"></rect>
<text fill="#4FACFE" font-weight="700" x="115" y="418">TRAVERSE</text>
<text fill="#B0BEC5" x="115" y="450">沿关系跳转 · 天然跨源 join</text>
<rect fill="#33251A" height="90" rx="12" stroke="#FB923C" width="440" x="580" y="380"></rect>
<text fill="#FB923C" font-weight="700" x="605" y="418">ASK ★</text>
<text fill="#B0BEC5" x="605" y="450">把子图交给 agentic Resolver 回答</text>
<rect fill="#251C3A" height="90" rx="12" stroke="#A78BFA" width="440" x="1070" y="380"></rect>
<text fill="#A78BFA" font-weight="700" x="1095" y="418">ACT ★</text>
<text fill="#B0BEC5" x="1095" y="450">执行动作 / 写回</text>
</g>
<rect fill="#1a2436" height="120" rx="14" stroke="#2E4060" width="1420" x="90" y="520"></rect>
<text fill="#EAF0F6" font-size="23" font-weight="700" text-anchor="middle" x="800" y="568">因为「问答 = ASK、跨源 join = TRAVERSE、写回 = ACT」都是同级算子</text>
<text fill="#FB923C" font-size="22" text-anchor="middle" x="800" y="608">「分析平台」和「行动平台」在这里是同一件事</text>
</svg>