<?xml version="1.0" encoding="UTF-8"?>
<svg viewbox="0 0 1600 718" xmlns="http://www.w3.org/2000/svg"><style>
                text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
                text[fill="#7e8fa6"] { fill: #b0bec5; }
            </style>
<!-- Pillar 1 -->
<g>
<rect fill="#1C2A42" height="520" rx="18" stroke="#2E4060" width="440" x="90" y="90"></rect>
<rect fill="#173049" height="86" rx="18" width="440" x="90" y="90"></rect>
<text fill="#4FACFE" font-size="34" font-weight="700" text-anchor="middle" x="310" y="132">Concept</text>
<text fill="#B0BEC5" font-size="20" text-anchor="middle" x="310" y="162">概念 · 统一「业务语义」</text>
<g fill="#EAF0F6" font-size="21">
<text x="130" y="240">· 语义图上的节点 / 边</text>
<text x="130" y="290">· 实体 Entity</text>
<text x="130" y="340">· 属性 Attribute</text>
<text x="130" y="390">· 关系 Relation</text>
<text x="130" y="440">· 指标 Metric</text>
<text x="130" y="490">· 维度 Dimension</text>
</g>
<text fill="#4FACFE" font-size="19" x="130" y="560">皆为「带类型的节点」</text>
</g>
<!-- Pillar 2 -->
<g>
<rect fill="#1C2A42" height="520" rx="18" stroke="#2E4060" width="440" x="580" y="90"></rect>
<rect fill="#16302A" height="86" rx="18" width="440" x="580" y="90"></rect>
<text fill="#34D399" font-size="34" font-weight="700" text-anchor="middle" x="800" y="132">Resolver</text>
<text fill="#B0BEC5" font-size="20" text-anchor="middle" x="800" y="162">解析器 · 统一「源=Agent=动作」</text>
<g fill="#EAF0F6" font-size="21">
<text x="620" y="250">· 把 Concept 绑定到现实</text>
<text x="620" y="305">· 满足某段子图的能力单元</text>
<text x="620" y="360">· manifest() 声明能力</text>
<text x="620" y="415">· plan() 竞标评估</text>
<text x="620" y="470">· resolve() 取数 / 问答 / 动作</text>
</g>
<text fill="#34D399" font-size="19" x="620" y="560">数据源与智能体在此抹平</text>
</g>
<!-- Pillar 3 -->
<g>
<rect fill="#1C2A42" height="520" rx="18" stroke="#2E4060" width="440" x="1070" y="90"></rect>
<rect fill="#33251A" height="86" rx="18" width="440" x="1070" y="90"></rect>
<text fill="#FB923C" font-size="34" font-weight="700" text-anchor="middle" x="1290" y="132">Intent</text>
<text fill="#B0BEC5" font-size="20" text-anchor="middle" x="1290" y="162">意图 · 统一「问答=计算=写回」</text>
<g fill="#EAF0F6" font-size="21">
<text x="1110" y="250">· 一次统一请求</text>
<text x="1110" y="305">· 自然语言 / API / 编排</text>
<text x="1110" y="360">· 编译成语义查询图 SQG</text>
<text x="1110" y="415">· 问答 · 计算 · 写回 · 动作</text>
<text x="1110" y="470">· 全归约为同一 IR</text>
</g>
<text fill="#FB923C" font-size="19" x="1110" y="560">一种请求覆盖所有场景</text>
</g>
<text fill="#B0BEC5" font-size="22" text-anchor="middle" x="800" y="665">加任何新东西 = 新增图里的节点，或一个新 Resolver —— 不引入新范式</text>
</svg>