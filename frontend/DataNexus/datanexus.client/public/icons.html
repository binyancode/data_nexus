<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Data Nexus · Icon 方案</title>
<style>
  :root { --midnight:#28334a; --page:#f4f6f7; --border:#dde3e8; --muted:#737f8c; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--page); color:var(--midnight); padding:32px; }
  h1 { font-size:22px; margin-bottom:4px; }
  p.sub { color:var(--muted); font-size:13px; margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
  .card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:18px; box-shadow:0 8px 20px rgba(40,51,74,.06); }
  .card h2 { font-size:14px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .tag { font-size:11px; color:var(--muted); font-weight:400; }
  .row { display:flex; align-items:center; gap:16px; }
  .swatch { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box { width:72px; height:72px; border-radius:16px; display:flex; align-items:center; justify-content:center; }
  .box.light { background:#fff; border:1px solid var(--border); }
  .box.dark { background:var(--midnight); }
  .box.tile { padding:0; overflow:hidden; }
  .mini { display:flex; align-items:center; gap:6px; margin-left:auto; }
  .mini .box { width:28px; height:28px; border-radius:7px; }
  .lbl { font-size:11px; color:var(--muted); }
  /* header mock */
  .hdr { margin-top:30px; }
  .bar { height:56px; background:var(--midnight); border-radius:10px; display:flex; align-items:center; padding:0 20px; gap:12px; }
  .bar .name { color:#fff; font-size:16px; font-weight:600; letter-spacing:.3px; }
</style>
</head>
<body>
  <h1>Data Nexus · Icon 方案（6 个）</h1>
  <p class="sub">每个方案在 浅底 / 深底(顶栏色) / 小尺寸(favicon) 下的效果。告诉我编号（A–F），我就替换 header 标志 + favicon。</p>

  <div class="grid" id="grid"></div>

  <div class="hdr">
    <p class="sub" style="margin:24px 0 8px">顶栏预览（默认用 A，替换时以你选的为准）：</p>
    <div class="bar"><span id="hdrmark"></span><span class="name">Data Nexus</span></div>
  </div>

<script>
const defs = `
<defs>
  <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#00859b"/><stop offset="1" stop-color="#003a70"/>
  </linearGradient>
  <linearGradient id="g-tile" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0a4c6e"/><stop offset="1" stop-color="#28334a"/>
  </linearGradient>
  <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffc72c"/><stop offset="1" stop-color="#e97600"/>
  </linearGradient>
</defs>`;

// ---- A: Nexus node graph (中心枢纽 + 环绕节点) ----
const A = `
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${defs}
 <g stroke="url(#g-blue)" stroke-width="2.4" stroke-linecap="round">
  <line x1="32" y1="32" x2="32" y2="13"/><line x1="32" y1="32" x2="50" y2="23"/>
  <line x1="32" y1="32" x2="46" y2="49"/><line x1="32" y1="32" x2="18" y2="49"/>
  <line x1="32" y1="32" x2="14" y2="23"/>
 </g>
 <g fill="url(#g-blue)">
  <circle cx="32" cy="13" r="4.3"/><circle cx="50" cy="23" r="4.3"/>
  <circle cx="46" cy="49" r="4.3"/><circle cx="18" cy="49" r="4.3"/><circle cx="14" cy="23" r="4.3"/>
 </g>
 <circle cx="32" cy="32" r="8.2" fill="url(#g-amber)"/>
 <circle cx="32" cy="32" r="3" fill="#fff"/>
</svg>`;

// ---- B: App tile 六边形枢纽 ----
const B = `
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${defs}
 <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#g-tile)"/>
 <polygon points="32,14 48,23 48,41 32,50 16,41 16,23" fill="none" stroke="#7fd6e6" stroke-width="2.2" stroke-linejoin="round" opacity=".85"/>
 <g stroke="#7fd6e6" stroke-width="2" stroke-linecap="round" opacity=".7">
   <line x1="32" y1="32" x2="32" y2="14"/><line x1="32" y1="32" x2="48" y2="41"/><line x1="32" y1="32" x2="16" y2="41"/>
 </g>
 <g fill="#fff"><circle cx="32" cy="14" r="3.2"/><circle cx="48" cy="41" r="3.2"/><circle cx="16" cy="41" r="3.2"/></g>
 <circle cx="32" cy="32" r="6" fill="url(#g-amber)"/>
</svg>`;

// ---- C: 节点连成的字母 N ----
const C = `
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${defs}
 <g stroke="url(#g-blue)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
   <path d="M16 50 L16 14 L48 50 L48 14"/>
 </g>
 <g fill="url(#g-blue)">
   <circle cx="16" cy="14" r="5"/><circle cx="48" cy="14" r="5"/>
   <circle cx="16" cy="50" r="5"/>
 </g>
 <circle cx="48" cy="50" r="6.5" fill="url(#g-amber)"/>
</svg>`;

// ---- D: 数据同心环 + 轨道节点 ----
const D = `
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${defs}
 <circle cx="32" cy="32" r="20" fill="none" stroke="url(#g-blue)" stroke-width="2.2" opacity=".45"/>
 <circle cx="32" cy="32" r="12" fill="none" stroke="url(#g-blue)" stroke-width="2.2" opacity=".8"/>
 <circle cx="32" cy="32" r="6" fill="url(#g-amber)"/>
 <g fill="url(#g-blue)">
   <circle cx="32" cy="12" r="4"/><circle cx="52" cy="32" r="4"/><circle cx="20" cy="44" r="4"/>
 </g>
</svg>`;

// ---- E: 等距数据立方 ----
const E = `
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${defs}
 <polygon points="32,10 54,22 32,34 10,22" fill="#0a6b83"/>
 <polygon points="10,22 32,34 32,58 10,46" fill="#0a4c6e"/>
 <polygon points="54,22 32,34 32,58 54,46" fill="#28334a"/>
 <circle cx="32" cy="22" r="4.5" fill="url(#g-amber)"/>
</svg>`;

// ---- F: 汇聚（三向流入中心）----
const F = `
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${defs}
 <g fill="none" stroke="url(#g-blue)" stroke-width="3.4" stroke-linecap="round">
   <path d="M12 16 Q30 20 31 30"/><path d="M52 16 Q34 20 33 30"/><path d="M32 54 L32 38"/>
 </g>
 <g fill="url(#g-blue)"><circle cx="12" cy="16" r="4"/><circle cx="52" cy="16" r="4"/><circle cx="32" cy="54" r="4"/></g>
 <circle cx="32" cy="32" r="8" fill="url(#g-amber)"/>
 <circle cx="32" cy="32" r="3" fill="#fff"/>
</svg>`;

const items = [
  ['A', '枢纽节点图', 'nexus / 语义图', A, false],
  ['B', '六边形枢纽 App 砖', 'app tile', B, true],
  ['C', '节点连成的 N', '字母标', C, false],
  ['D', '数据同心环', 'orbits', D, false],
  ['E', '等距数据立方', 'data cube', E, false],
  ['F', '三向汇聚', 'converge', F, false],
];

const grid = document.getElementById('grid');
for (const [id, name, tag, svg, tile] of items) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>${id} · ${name} <span class="tag">${tag}</span></h2>
    <div class="row">
      <div class="swatch"><div class="box light ${tile?'tile':''}">${svg}</div><span class="lbl">浅底</span></div>
      <div class="swatch"><div class="box dark ${tile?'tile':''}">${svg}</div><span class="lbl">深底</span></div>
      <div class="mini">
        <div class="box light ${tile?'tile':''}">${svg}</div>
        <div class="box dark ${tile?'tile':''}">${svg}</div>
      </div>
    </div>`;
  // size the inner svgs
  card.querySelectorAll('svg').forEach(s => { s.setAttribute('width','48'); s.setAttribute('height','48'); });
  card.querySelectorAll('.mini svg').forEach(s => { s.setAttribute('width','22'); s.setAttribute('height','22'); });
  card.querySelectorAll('.box.tile svg').forEach(s => { s.setAttribute('width','72'); s.setAttribute('height','72'); });
  card.querySelectorAll('.mini .box.tile svg').forEach(s => { s.setAttribute('width','28'); s.setAttribute('height','28'); });
  grid.appendChild(card);
}

// header mock uses A
const hm = document.getElementById('hdrmark');
hm.innerHTML = A;
hm.querySelector('svg').setAttribute('width','30');
hm.querySelector('svg').setAttribute('height','30');
</script>
</body>
</html>
