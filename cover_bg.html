<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>html,body{margin:0;background:#0A1120}</style></head>
<body>
<svg id="bg" viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bggrad" cx="50%" cy="46%" r="75%">
      <stop offset="0%" stop-color="#101C33"/>
      <stop offset="55%" stop-color="#0C1526"/>
      <stop offset="100%" stop-color="#070C18"/>
    </radialGradient>
    <radialGradient id="coreglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2E6BD6" stop-opacity="0.42"/>
      <stop offset="45%" stop-color="#2450A8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2450A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="puglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FACFE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6FC0FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4FACFE" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bggrad)"/>

  <!-- faint grid -->
  <g stroke="#1A2A44" stroke-width="1" opacity="0.35">
    <line x1="0" y1="120" x2="1280" y2="120"/><line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/><line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/><line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/><line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- big soft glows -->
  <ellipse cx="640" cy="360" rx="520" ry="360" fill="url(#coreglow)"/>
  <circle cx="180" cy="210" r="240" fill="url(#cyglow)"/>
  <circle cx="1090" cy="520" r="260" fill="url(#puglow)"/>

  <!-- light beams -->
  <g>
    <rect x="-200" y="150" width="1720" height="46" fill="url(#beam)" transform="rotate(-17 640 360)"/>
    <rect x="-200" y="520" width="1720" height="32" fill="url(#beam)" transform="rotate(-17 640 360)"/>
    <rect x="-200" y="330" width="1720" height="26" fill="url(#beam)" transform="rotate(12 640 360)"/>
  </g>

  <!-- sonar rings -->
  <g stroke="#2E5A9E" fill="none">
    <circle cx="640" cy="360" r="170" opacity="0.22"/>
    <circle cx="640" cy="360" r="290" opacity="0.15"/>
    <circle cx="640" cy="360" r="420" opacity="0.11" stroke-dasharray="3 11"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#4FACFE" stroke-width="2.5" fill="none" opacity="0.45">
    <path d="M40,42 L40,96 M40,42 L96,42"/>
    <path d="M1240,42 L1240,96 M1240,42 L1184,42"/>
    <path d="M40,678 L40,624 M40,678 L96,678"/>
    <path d="M1240,678 L1240,624 M1240,678 L1184,678"/>
  </g>

  <!-- hexagons -->
  <g stroke="#2AA9C0" stroke-width="1.5" fill="none" opacity="0.32">
    <polygon points="1184,640 1167,669 1133,669 1116,640 1133,611 1167,611"/>
    <polygon points="168,660 154,684 126,684 112,660 126,636 154,636"/>
    <polygon points="620,96 606,120 578,120 564,96 578,72 606,72" opacity="0.8"/>
  </g>

  <!-- ontology graph edges -->
  <g stroke-width="1.4" fill="none" opacity="0.55">
    <g stroke="#3E7BD0">
      <line x1="120" y1="110" x2="250" y2="180"/>
      <line x1="250" y1="180" x2="360" y2="330"/>
      <line x1="120" y1="110" x2="90" y2="300"/>
      <line x1="90" y1="300" x2="200" y2="420"/>
      <line x1="200" y1="420" x2="140" y2="560"/>
      <line x1="400" y1="120" x2="520" y2="240"/>
      <line x1="520" y1="240" x2="360" y2="330"/>
      <line x1="250" y1="180" x2="400" y2="120"/>
      <line x1="200" y1="420" x2="480" y2="520"/>
      <line x1="480" y1="520" x2="640" y2="600"/>
      <line x1="360" y1="330" x2="480" y2="520"/>
    </g>
    <g stroke="#7C6FD0">
      <line x1="1160" y1="120" x2="1050" y2="210"/>
      <line x1="1050" y1="210" x2="1180" y2="330"/>
      <line x1="1180" y1="330" x2="1220" y2="450"/>
      <line x1="980" y1="420" x2="1140" y2="540"/>
      <line x1="1140" y1="540" x2="900" y2="600"/>
      <line x1="1160" y1="120" x2="860" y2="160"/>
      <line x1="860" y1="160" x2="760" y2="290"/>
      <line x1="760" y1="290" x2="1000" y2="330"/>
      <line x1="1000" y1="330" x2="980" y2="420"/>
      <line x1="1050" y1="210" x2="1000" y2="330"/>
      <line x1="900" y1="600" x2="820" y2="470"/>
      <line x1="820" y1="470" x2="640" y2="600"/>
      <line x1="760" y1="290" x2="820" y2="470"/>
    </g>
    <g stroke="#2AA9C0">
      <line x1="700" y1="90" x2="860" y2="160"/>
      <line x1="700" y1="90" x2="520" y2="240"/>
      <line x1="640" y1="600" x2="820" y2="470"/>
    </g>
  </g>

  <!-- glow halos -->
  <g filter="url(#soft)" opacity="0.9">
    <circle cx="120" cy="110" r="14" fill="#4FACFE"/>
    <circle cx="520" cy="240" r="14" fill="#4FACFE"/>
    <circle cx="200" cy="420" r="12" fill="#22D3EE"/>
    <circle cx="1160" cy="120" r="14" fill="#A78BFA"/>
    <circle cx="980" cy="420" r="13" fill="#4FACFE"/>
    <circle cx="860" cy="160" r="12" fill="#A78BFA"/>
    <circle cx="640" cy="600" r="12" fill="#22D3EE"/>
    <circle cx="1140" cy="540" r="12" fill="#22D3EE"/>
    <circle cx="480" cy="520" r="11" fill="#A78BFA"/>
  </g>

  <!-- node pulse rings -->
  <g fill="none">
    <circle cx="120" cy="110" r="16" stroke="#4FACFE" opacity="0.4"/>
    <circle cx="120" cy="110" r="25" stroke="#4FACFE" opacity="0.16"/>
    <circle cx="1160" cy="120" r="16" stroke="#A78BFA" opacity="0.4"/>
    <circle cx="1160" cy="120" r="25" stroke="#A78BFA" opacity="0.15"/>
    <circle cx="980" cy="420" r="16" stroke="#4FACFE" opacity="0.36"/>
    <circle cx="520" cy="240" r="16" stroke="#4FACFE" opacity="0.36"/>
    <circle cx="200" cy="420" r="14" stroke="#22D3EE" opacity="0.32"/>
    <circle cx="1140" cy="540" r="14" stroke="#22D3EE" opacity="0.3"/>
  </g>

  <!-- crisp nodes -->
  <g>
    <circle cx="120" cy="110" r="6" fill="#8CC6FF"/>
    <circle cx="250" cy="180" r="5" fill="#5AD7E8"/>
    <circle cx="90" cy="300" r="5" fill="#B7A6FA"/>
    <circle cx="200" cy="420" r="6" fill="#8CC6FF"/>
    <circle cx="140" cy="560" r="5" fill="#5AD7E8"/>
    <circle cx="400" cy="120" r="5" fill="#B7A6FA"/>
    <circle cx="520" cy="240" r="6" fill="#8CC6FF"/>
    <circle cx="360" cy="330" r="4" fill="#5AD7E8"/>
    <circle cx="480" cy="520" r="5" fill="#B7A6FA"/>
    <circle cx="640" cy="600" r="5" fill="#5AD7E8"/>
    <circle cx="700" cy="90" r="4" fill="#5AD7E8"/>
    <circle cx="1160" cy="120" r="6" fill="#B7A6FA"/>
    <circle cx="1050" cy="210" r="5" fill="#8CC6FF"/>
    <circle cx="1180" cy="330" r="5" fill="#B7A6FA"/>
    <circle cx="1220" cy="450" r="4" fill="#8CC6FF"/>
    <circle cx="980" cy="420" r="6" fill="#8CC6FF"/>
    <circle cx="1140" cy="540" r="5" fill="#5AD7E8"/>
    <circle cx="900" cy="600" r="5" fill="#7FE3B0"/>
    <circle cx="860" cy="160" r="5" fill="#B7A6FA"/>
    <circle cx="760" cy="290" r="5" fill="#8CC6FF"/>
    <circle cx="1000" cy="330" r="4" fill="#5AD7E8"/>
    <circle cx="820" cy="470" r="4" fill="#5AD7E8"/>
  </g>

  <!-- particles -->
  <g fill="#5E7DA6" opacity="0.5">
    <circle cx="300" cy="90" r="2"/><circle cx="430" cy="300" r="2"/><circle cx="600" cy="180" r="2"/>
    <circle cx="720" cy="420" r="2"/><circle cx="560" cy="440" r="2"/><circle cx="330" cy="500" r="2"/>
    <circle cx="1000" cy="150" r="2"/><circle cx="920" cy="360" r="2"/><circle cx="1120" cy="260" r="2"/>
    <circle cx="1200" cy="600" r="2"/><circle cx="700" cy="560" r="2"/><circle cx="180" cy="650" r="2"/>
    <circle cx="60" cy="440" r="2"/><circle cx="1240" cy="180" r="2"/><circle cx="500" cy="650" r="2"/>
  </g>
</svg>
</body></html>
